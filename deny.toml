# cargo-deny 配置：依赖白名单 + 许可证审计
# 职责之一：强制 docs/architecture.md §4.1 的依赖方向（配合各 crate Cargo.toml 的最小依赖声明）

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots（rustls 根证书数据）：宽松数据许可
    "CDLA-Permissive-2.0",
]
# 逐 crate 例外：不放宽全局许可政策，只为特定传递依赖开口。
# option-ext 是 directories -> dirs-sys 的传递依赖，MPL-2.0（文件级弱 copyleft，
# 不感染本项目；仅该文件的修改需保持 MPL）。用 directories 拿平台标准目录（ADR-0009）。
exceptions = [
    { crate = "option-ext", allow = ["MPL-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# workspace 内部 path 依赖不是真通配符
allow-wildcard-paths = true
# 禁止重量级依赖混入（轻量是产品定位，不是巧合）
deny = [
    { crate = "openssl", reason = "统一走 rustls，避免系统 OpenSSL 链接地狱" },
    { crate = "actix", reason = "ADR-002：不引入 actor 框架，机组用 tokio task + channel 表达" },
    { crate = "ractor", reason = "ADR-002：不引入 actor 框架" },
]

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
