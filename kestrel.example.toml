# Kestrel 配置示例。复制为 kestrel.toml 后按需修改（kestrel.toml 不入库）。

approval_policy = "on-request"   # on-request | auto | strict

# 全局禁用的工具（deny 优先）：组装时从工具列表预过滤掉，模型看不见也调不到。
# 例：deny_tools = ["shell"] 起一个纯读写文件、绝不执行命令的 agent。留空即全放行。
deny_tools = []

workdir = "."

# 会话/数据默认存 OS 标准目录（ADR-0009）：
#   Windows %LOCALAPPDATA%\Kestrel\data  ·  Linux ~/.local/share/kestrel  ·  macOS ~/Library/Application Support/Kestrel
# 想让数据留在项目里：在启动目录建一个 .kestrel/ 文件夹（opt-in），或设环境变量
#   KESTREL_DATA_DIR / KESTREL_CONFIG_DIR。首次运行会把旧的 ./sessions 自动迁移过去（拷贝，不删）。
# 下面这行是显式覆盖，取消注释即把会话强制存到指定目录（优先于标准目录）：
# sessions_dir = "sessions"

# 模型启动器（ADR-0010）：指向一份 Loadout 清单即可让 Kestrel 自己把模型起起来
#（自启 llama.cpp / 委托已跑宿主 / 纯连接），清单里的 [model] 覆盖下面的 [backend]。
# 相对路径按本配置文件所在目录解析。留空（默认）= 走下面的 [backend] 纯连接。
# 见 kestrel.example.loadout.toml。
# loadout = "kestrel.loadout.toml"

[backend]
# kind: openai（兜底，默认）| llamacpp | lmstudio
#   llamacpp / lmstudio 会在启动时探测后端真实上下文长度，覆盖下面的 n_ctx。
# llama-server:  ./llama-server -m model.gguf --jinja --port 8080   ->  kind = "llamacpp"
# LM Studio:     Developer -> Start Server（默认 1234 端口）          ->  kind = "lmstudio"
kind = "openai"
base_url = "http://127.0.0.1:8080"
api_key = ""            # 本地后端通常留空
model = "local"         # LM Studio 需填已加载的模型名
n_ctx = 16384           # 兜底上下文长度；llamacpp/lmstudio 探测成功时以实测值覆盖
