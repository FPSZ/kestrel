# Kestrel 配置示例。复制为 kestrel.toml 后按需修改（kestrel.toml 不入库）。

approval_policy = "on-request"   # on-request | auto | strict

# 全局禁用的工具（deny 优先）：组装时从工具列表预过滤掉，模型看不见也调不到。
# 例：deny_tools = ["shell"] 起一个纯读写文件、绝不执行命令的 agent。留空即全放行。
deny_tools = []

workdir = "."
sessions_dir = "sessions"

[backend]
# kind: openai（兜底，默认）| llamacpp | lmstudio
#   llamacpp / lmstudio 会在启动时探测后端真实上下文长度，覆盖下面的 n_ctx。
# llama-server:  ./llama-server -m model.gguf --jinja --port 8080   ->  kind = "llamacpp"
# LM Studio:     Developer -> Start Server（默认 1234 端口）          ->  kind = "lmstudio"
kind = "openai"
base_url = "http://127.0.0.1:8080"
api_key = ""            # 本地后端通常留空
model = "local"         # LM Studio 需填已加载的模型名
n_ctx = 16384           # 兜底上下文长度；llamacpp/lmstudio 探测成功时以实测值覆盖
